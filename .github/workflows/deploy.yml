name: CI / Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ── Job 1: Build & Test ─────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn verify -B --no-transfer-progress -T 1C

      - name: Upload JAR
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ── Job 2: Build image, upload artifacts, push to ECR ───────────
  deploy:
    name: Deploy
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Upload S3 artifacts BEFORE Docker push to prevent EventBridge race condition
      - name: Upload CodeDeploy artifacts to S3
        env:
          IMAGE_URI:     ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          EXEC_ROLE:     ${{ secrets.ECS_EXEC_ROLE_ARN }}
          TASK_ROLE:     ${{ secrets.ECS_TASK_ROLE_ARN }}
          ENV_NAME:      ${{ secrets.ENV_NAME }}
          DB_HOST:       ${{ secrets.DB_HOST }}
          DB_SECRET_ARN: ${{ secrets.DB_SECRET_ARN }}
          IMAGES_BUCKET: ${{ secrets.IMAGES_BUCKET }}
          CF_DOMAIN:     ${{ secrets.CLOUDFRONT_DOMAIN }}
          AWS_REGION:    ${{ secrets.AWS_REGION }}
        run: |
          sed "s|<IMAGE1_NAME>|${IMAGE_URI}|g; \
               s|EXECUTION_ROLE_ARN_PLACEHOLDER|${EXEC_ROLE}|g; \
               s|TASK_ROLE_ARN_PLACEHOLDER|${TASK_ROLE}|g; \
               s|ENV_PLACEHOLDER|${ENV_NAME}|g; \
               s|DB_HOST_PLACEHOLDER|${DB_HOST}|g; \
               s|DB_SECRET_ARN_PLACEHOLDER|${DB_SECRET_ARN}|g; \
               s|IMAGES_BUCKET_PLACEHOLDER|${IMAGES_BUCKET}|g; \
               s|CLOUDFRONT_DOMAIN_PLACEHOLDER|${CF_DOMAIN}|g; \
               s|AWS_REGION_PLACEHOLDER|${AWS_REGION}|g" \
            codedeploy/taskdef.json > /tmp/taskdef.json

          cp codedeploy/appspec.yaml /tmp/appspec.yaml
          cd /tmp && zip -q deploy-artifacts.zip taskdef.json appspec.yaml
          aws s3 cp deploy-artifacts.zip "s3://${{ secrets.ARTIFACTS_BUCKET }}/${ENV_NAME}/deploy-artifacts.zip"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "::notice title=Deployed::${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest"
