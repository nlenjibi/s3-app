<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Photo</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #131929;
      --surface2:  #1a2236;
      --border:    rgba(255,255,255,0.07);
      --accent:    #6366f1;
      --accent-h:  #4f52d8;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --error-bg:  rgba(239,68,68,0.1);
      --error-bd:  rgba(239,68,68,0.3);
      --error-tx:  #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.15rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      text-decoration: none;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem 4rem;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
    }

    .form-card h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .form-card .sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .flash {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .flash.error { background: var(--error-bg); border: 1px solid var(--error-bd); color: var(--error-tx); }

    .field { margin-bottom: 1.4rem; }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    /* ── Drop zone ── */
    .drop-zone {
      border: 2px dashed rgba(99,102,241,0.35);
      border-radius: 10px;
      padding: 2.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      background: rgba(99,102,241,0.03);
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(99,102,241,0.08);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      margin: 0 auto 0.75rem;
      width: 48px;
      height: 48px;
      background: var(--surface2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drop-zone h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .drop-zone p {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .drop-zone .file-name {
      margin-top: 0.75rem;
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 500;
      min-height: 1.2em;
    }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      color: var(--text);
      resize: vertical;
      min-height: 96px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }

    .btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-align: center;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
    }
    .btn:active { transform: translateY(1px); }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: #1f2d45; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .footer-text { font-size: 0.78rem; color: var(--muted); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.2rem 0.55rem;
      border-radius: 20px;
    }

    .footer-badges { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; justify-content: center; }

    @media (max-width: 560px) {
      main { padding: 1.5rem 0.75rem 3rem; }
      .form-card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <a th:href="@{/gallery}" class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="8" fill="#6366f1"/>
      <path d="M6 20L10.5 13.5L14 17.5L17.5 12L22 20H6Z" fill="white" opacity="0.9"/>
      <circle cx="10" cy="10" r="2.5" fill="white" opacity="0.75"/>
    </svg>
    Photo Gallery
  </a>
  <a th:href="@{/gallery}" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back to Gallery
  </a>
</header>

<main>
  <div class="form-card">
    <h2>Upload a Photo</h2>
    <p class="sub">Share an image to your gallery — served globally via CloudFront.</p>

    <div th:if="${error}" class="flash error">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span th:text="${error}"></span>
    </div>

    <form th:action="@{/photos}" method="post" enctype="multipart/form-data" id="upload-form">

      <div class="field">
        <label>Image File</label>
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file" name="file"
                 accept="image/jpeg,image/png,image/gif,image/webp" required/>
          <div class="drop-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <h3>Drop your image here</h3>
          <p>or click to browse files</p>
          <p class="file-name" id="file-name"></p>
        </div>
        <p class="hint">JPEG, PNG, GIF or WebP &mdash; max 10 MB</p>
      </div>

      <div class="field">
        <label for="description">Caption</label>
        <textarea id="description" name="description"
                  placeholder="Add a caption for this photo..."></textarea>
      </div>

      <div class="btn-row">
        <a th:href="@{/gallery}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-primary" id="submit-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload
        </button>
      </div>
    </form>
  </div>
</main>

<footer>
  <span class="footer-text">Powered by</span>
  <div class="footer-badges">
    <span class="badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="#6ee7b7"><circle cx="12" cy="12" r="10"/></svg>
      Spring Boot
    </span>
    <span class="badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="#60a5fa"><circle cx="12" cy="12" r="10"/></svg>
      Amazon ECS
    </span>
    <span class="badge">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="#c084fc"><circle cx="10" cy="12" r="10"/></svg>
      CloudFront
    </span>
  </div>
</footer>

<script>
  const input = document.getElementById('file');
  const zone  = document.getElementById('drop-zone');
  const label = document.getElementById('file-name');
  const form  = document.getElementById('upload-form');
  const btn   = document.getElementById('submit-btn');

  input.addEventListener('change', () => {
    label.textContent = input.files[0] ? input.files[0].name : '';
  });

  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) {
      input.files = e.dataTransfer.files;
      label.textContent = input.files[0].name;
    }
  });

  form.addEventListener('submit', () => {
    btn.disabled = true;
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 0.8s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Uploading…`;
  });
</script>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
