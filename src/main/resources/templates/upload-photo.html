<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Photo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1.4rem; letter-spacing: 0.05em; }

    header a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.9rem;
    }

    header a:hover { text-decoration: underline; }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 3rem 1rem;
    }

    .form-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    .form-card h2 {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
      color: #1a1a2e;
    }

    .flash {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .flash.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    .field { margin-bottom: 1.2rem; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    input[type="file"],
    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      font-size: 0.9rem;
      color: #1a1a2e;
      background: #f9fafb;
      transition: border-color 0.2s;
    }

    input[type="file"]:focus,
    textarea:focus {
      outline: none;
      border-color: #4f8cff;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 90px; }

    .hint {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 0.3rem;
    }

    .btn-row {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.6rem;
    }

    .btn {
      flex: 1;
      padding: 0.7rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-primary { background: #4f8cff; color: #fff; }
    .btn-primary:hover { background: #2563eb; }

    .btn-outline {
      background: transparent;
      color: #4f8cff;
      border: 1.5px solid #4f8cff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-outline:hover { background: #eff6ff; }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<header>
  <h1>Photo Gallery</h1>
  <a th:href="@{/gallery}">&larr; Back to Gallery</a>
</header>

<main>
  <div class="form-card">
    <h2>Upload a Photo</h2>

    <div th:if="${error}" class="flash error" th:text="${error}"></div>

    <form th:action="@{/photos}" method="post" enctype="multipart/form-data">

      <div class="field">
        <label for="file">Image file</label>
        <input type="file" id="file" name="file"
               accept="image/jpeg,image/png,image/gif,image/webp" required/>
        <p class="hint">JPEG, PNG, GIF or WebP &mdash; max 10 MB</p>
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" name="description"
                  placeholder="Add a caption for this photo..."></textarea>
      </div>

      <div class="btn-row">
        <a th:href="@{/gallery}" class="btn btn-outline">Cancel</a>
        <button type="submit" class="btn btn-primary">Upload</button>
      </div>
    </form>
  </div>
</main>

<footer>Powered by Spring Boot &bull; Amazon ECS &bull; CloudFront</footer>
</body>
</html>
