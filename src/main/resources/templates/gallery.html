<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photo Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1.4rem; letter-spacing: 0.05em; }

    header a {
      background: #4f8cff;
      color: #fff;
      text-decoration: none;
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    header a:hover { background: #2563eb; }

    .flash {
      max-width: 1100px;
      margin: 1rem auto 0;
      padding: 0.75rem 1.2rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .flash.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    .flash.error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    main { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }

    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: #6b7280;
    }

    .empty p { font-size: 1.1rem; margin-bottom: 1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.12);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 0.9rem 1rem; }

    .card-body p {
      font-size: 0.9rem;
      color: #374151;
      line-height: 1.5;
      word-break: break-word;
    }

    .card-body time {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #9ca3af;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<header>
  <h1>Photo Gallery</h1>
  <a th:href="@{/upload}">+ Upload Photo</a>
</header>

<div th:if="${success}" class="flash success" th:text="${success}"></div>
<div th:if="${error}"   class="flash error"   th:text="${error}"></div>

<main>
  <div th:if="${#lists.isEmpty(photos)}" class="empty">
    <p>No photos yet.</p>
    <a th:href="@{/upload}">Upload the first one</a>
  </div>

  <div th:unless="${#lists.isEmpty(photos)}" class="grid">
    <div th:each="photo : ${photos}" class="card">
      <img th:src="${photo.imageUrl()}"
           th:alt="${photo.description()}"
           loading="lazy"/>
      <div class="card-body">
        <p th:text="${photo.description()}"></p>
        <time th:datetime="${photo.createdAt()}"
              th:text="${#temporals.format(photo.createdAt(), 'dd MMM yyyy, HH:mm')}"></time>
      </div>
    </div>
  </div>
</main>

<footer>Powered by Spring Boot &bull; Amazon ECS &bull; CloudFront</footer>
</body>
</html>
